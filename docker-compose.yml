services:
  market-data-gateway:
    build:
      context: .
      dockerfile: python-backend/Dockerfile
    env_file:
      - python-backend/.env
      - .env
    working_dir: /app/python-backend
    command: python -m pipeline.runtime.run_market_data_gateway
    volumes:
      - ./python-backend:/app/python-backend
      - ./:/app
    restart: unless-stopped

  sorting:
    build:
      context: .
      dockerfile: python-backend/Dockerfile
    env_file:
      - python-backend/.env
      - .env
    working_dir: /app/python-backend
    environment:
      MARKET_DATA_GATEWAY_URL: http://market-data-gateway:8010
    command: python -m pipeline.runtime.run_sorting
    depends_on:
      - market-data-gateway
    volumes:
      - ./python-backend:/app/python-backend
      - ./:/app
    restart: unless-stopped

  monitor:
    build:
      context: .
      dockerfile: python-backend/Dockerfile
    env_file:
      - python-backend/.env
      - .env
    working_dir: /app/python-backend
    environment:
      MARKET_DATA_GATEWAY_URL: http://market-data-gateway:8010
    command: python -m pipeline.runtime.run_monitor_loop
    depends_on:
      - market-data-gateway
    volumes:
      - ./python-backend:/app/python-backend
      - ./:/app
    restart: unless-stopped

  regime:
    build:
      context: .
      dockerfile: python-backend/Dockerfile
    env_file:
      - python-backend/.env
      - .env
    working_dir: /app/python-backend
    environment:
      MARKET_DATA_GATEWAY_URL: http://market-data-gateway:8010
    command: python -m pipeline.runtime.run_regime_loop
    depends_on:
      - market-data-gateway
    volumes:
      - ./python-backend:/app/python-backend
      - ./:/app
    restart: unless-stopped

  ai-trading-agents:
    build:
      context: .
      dockerfile: python-backend/Dockerfile
    container_name: trader-ai-trading-agents
    env_file:
      - python-backend/.env
      - .env
    working_dir: /app/python-backend
    environment:
      MARKET_DATA_GATEWAY_URL: http://market-data-gateway:8010
    command: python -m pipeline.runtime.run_ai_trading_orchestrator
    depends_on:
      - market-data-gateway
    ports:
      - "8020:8020"
    volumes:
      - ./python-backend:/app/python-backend
      - ./:/app
    restart: unless-stopped
