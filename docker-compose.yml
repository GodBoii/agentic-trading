services:
  backend:
    build:
      context: .
      dockerfile: python-backend/Dockerfile
    env_file:
      - python-backend/.env
      - .env
    working_dir: /app/python-backend
    command: python -m pipeline.runtime.run_backend
    volumes:
      - ./python-backend:/app/python-backend
      - ./:/app
    restart: unless-stopped
